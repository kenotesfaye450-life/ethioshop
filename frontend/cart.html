<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shopping Cart - EthioShop</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <h1>EthioShop</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="request.html">Request Product</a>
                    <a href="dashboard.html">My Account</a>
                    <a href="cart.html" class="cart-link">
                        Cart <span class="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h2 style="margin: 2rem 0;">Shopping Cart</h2>
            
            <div class="cart-container">
                <div id="cartItems">
                    <!-- Cart items will be loaded here -->
                </div>
                
                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <div class="cart-total">
                        <span>Subtotal:</span>
                        <span id="cartSubtotal">0 ETB</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary" style="width: 100%; text-align: center;">
                        Proceed to Checkout
                    </a>
                </div>
                
                <div id="emptyCart" style="display: none; text-align: center; padding: 3rem;">
                    <p style="font-size: 1.2rem; color: #666; margin-bottom: 1rem;">Your cart is empty</p>
                    <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 EthioShop. All rights reserved.</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="assets/js/phone-utils.js"></script>
    <script src="assets/js/guest-auth.js"></script>
    <script src="assets/js/site-enhancements.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/cart.js"></script>
    <script>
        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');
            const emptyCart = document.getElementById('emptyCart');
            const subtotalEl = document.getElementById('cartSubtotal');
            
            if (cart.items.length === 0) {
                cartItems.innerHTML = '';
                cartSummary.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }
            
            emptyCart.style.display = 'none';
            cartSummary.style.display = 'block';
            
            cartItems.innerHTML = cart.items.map(item => `
                <div class="cart-item">
                    <img src="${item.image_url || 'assets/images/placeholder.jpg'}" 
                         alt="${item.name}" 
                         class="cart-item-image">
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p>${item.price} ETB</p>
                    </div>
                    <div class="cart-item-actions">
                        <input type="number" 
                               class="quantity-input" 
                               value="${item.quantity}" 
                               min="1"
                               onchange="updateQuantity(${item.product_id}, this.value)">
                        <button class="btn btn-sm" 
                                style="background: #e74c3c;"
                                onclick="removeFromCart(${item.product_id})">
                            Remove
                        </button>
                    </div>
                </div>
            `).join('');
            
            const subtotal = cart.getSubtotal();
            subtotalEl.textContent = `${subtotal.toFixed(2)} ETB`;
        }
        
        function updateQuantity(productId, quantity) {
            cart.updateQuantity(productId, parseInt(quantity));
            renderCart();
        }
        
        function removeFromCart(productId) {
            if (confirm('Remove this item from cart?')) {
                cart.removeItem(productId);
                renderCart();
            }
        }
        
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
