<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Cleanup - EthioShop Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>EthioShop Admin</h2>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="orders.html">📦 Orders</a>
            <a href="products.html">🛍️ Products</a>
            <a href="requests.html">📋 Customer Requests</a>

        </nav>
    </aside>
    <main class="main-content">
        <header><h1>Storage Cleanup</h1></header>
        <div class="card">
            <p>Scan Cloudinary assets and detect orphaned images not referenced by the database.</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <button class="btn-primary" onclick="scanOrphans(false)">Scan orphaned images</button>
                <button class="btn-danger" onclick="scanOrphans(true)">Delete listed orphans</button>
            </div>
            <div id="storageUsage" style="margin-top:1rem;"></div>
            <div id="orphansTable" style="margin-top:1rem;"></div>
        </div>
    </main>
</div>
<script src="../config.js"></script>
