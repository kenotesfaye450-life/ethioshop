<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Requests - EthioShop Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>EthioShop Admin</h2>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="orders.html">📦 Orders</a>
            <a href="products.html">🛍️ Products</a>
            <a href="requests.html" class="active">📋 Customer Requests</a>
            <a href="refunds.html">💰 Refunds</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="admins.html">👥 Admins</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
        <div class="admin-info"><p id="adminName"></p></div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Customer Requests</h1>
            <select id="statusFilter" onchange="loadRequests(1)">
                <option value="">All statuses</option>
                <option value="pending_sourcing">Pending sourcing</option>
                <option value="price_quoted">Price quoted</option>
                <option value="converted">Converted</option>
                <option value="rejected">Rejected</option>
            </select>
        </header>
        <div id="requestsContainer"><p>Loading...</p></div>
    </main>
</div>

<script src="../config.js"></script>
<script src="js/auth.js"></script>
<script src="js/requests.js"></script>
</body>
</html>
