<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - EthioShop Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>EthioShop Admin</h2>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="orders.html">📦 Orders</a>
            <a href="products.html">🛍️ Products</a>
            <a href="requests.html">📋 Customer Requests</a>
            <a href="refunds.html">💰 Refunds</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="admins.html" class="active">👥 Admins</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
        <div class="admin-info"><p id="adminName"></p></div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Admin Management</h1>
            <button onclick="showCreateModal()" class="btn-primary">+ Create Admin</button>
        </header>
        <div id="adminsContainer"><p>Loading admins...</p></div>
    </main>
</div>

<!-- Create Admin Modal -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeCreateModal()">&times;</span>
        <h2>Create New Admin</h2>
        <form id="createForm" onsubmit="createAdmin(event)">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="newUsername" required>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="newPhone" required placeholder="+251912345678"
                       pattern="(\+251|251|0)[97]\d{8}">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label>Role *</label>
                <select id="newRole" required>
                    <option value="">Select role...</option>
                    <option value="super_admin">Super Admin</option>
                    <option value="warehouse_staff">Warehouse Staff</option>
                    <option value="verifier">Verifier</option>
                    <option value="support_agent">Support Agent</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="width:100%;margin-top:1rem;">Create Admin</button>
        </form>
    </div>
</div>

<script src="../config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admins.js"></script>
</body>
</html>
