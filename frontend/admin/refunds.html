<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refunds - EthioShop Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>EthioShop Admin</h2>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="orders.html">📦 Orders</a>
            <a href="products.html">🛍️ Products</a>
            <a href="requests.html">📋 Customer Requests</a>
            <a href="refunds.html" class="active">💰 Refunds</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="admins.html">👥 Admins</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
        <div class="admin-info"><p id="adminName"></p></div>
    </aside>
    <main class="main-content">
        <header>
            <h1>Refund Requests</h1>
            <select id="statusFilter" onchange="loadRefunds(1)">
                <option value="">All</option>
                <option value="pending_review">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
        </header>
        <div id="refundsContainer"><p>Loading...</p></div>
    </main>
</div>
<script src="../config.js"></script>
<script src="js/auth.js"></script>
<script src="js/refunds.js"></script>
</body>
</html>
