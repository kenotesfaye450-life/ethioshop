<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - EthioShop Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>EthioShop Admin</h2>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="orders.html">📦 Orders</a>
            <a href="products.html" class="active">🛍️ Products</a>
            <a href="requests.html">📋 Customer Requests</a>
            <a href="refunds.html">💰 Refunds</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="admins.html">👥 Admins</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
        <div class="admin-info"><p id="adminName"></p></div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Products Management</h1>
            <button onclick="showAddProduct()" class="btn-primary">+ Add Product</button>
        </header>
        <div id="productsContainer"><p>Loading products...</p></div>
    </main>
</div>

<!-- Product Form Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeProductModal()">&times;</span>
        <h2 id="modalTitle">Add Product</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="productId">

            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="productDescription" rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cost Price (ETB) *</label>
                    <input type="number" id="costPrice" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Selling Price (ETB) *</label>
                    <input type="number" id="sellingPrice" step="0.01" min="0" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Stock *</label>
                    <input type="number" id="stock" min="0" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category">
                        <option value="">Select category</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Or enter new category</label>
                <input type="text" id="customCategory" placeholder="Leave empty to use dropdown">
            </div>
            <div class="form-group">
                <label>Product images</label>
                <input type="file" id="productImages" multiple accept="image/*">
                <div id="existingImages" style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.5rem;"></div>
            </div>
            <div class="form-group">
                <label>Image URL (optional legacy)</label>
                <input type="url" id="imageUrl" placeholder="https://...">
            </div>
            <div class="form-actions">
                <button type="button" onclick="closeProductModal()" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Product</button>
            </div>
        </form>
    </div>
</div>

<script src="../config.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>
</body>
</html>
