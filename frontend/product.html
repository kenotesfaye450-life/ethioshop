<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product - EthioShop</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0 3rem;
        }
        @media (max-width: 768px) {
            .product-detail-grid { grid-template-columns: 1fr; }
        }
        .gallery-main img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .gallery-thumbs {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }
        .gallery-thumb {
            border: 2px solid transparent;
            border-radius: 6px;
            padding: 0;
            cursor: pointer;
            background: none;
        }
        .gallery-thumb.active { border-color: #2c7da0; }
        .gallery-thumb img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
        }
        .product-price-lg {
            font-size: 1.75rem;
            font-weight: bold;
            color: #27ae60;
            margin: 0.5rem 0 1rem;
        }
        .product-category {
            color: #888;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand"><h1>EthioShop</h1></div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="dashboard.html">My Account</a>
                    <a href="cart.html" class="cart-link">Cart <span class="cart-badge">0</span></a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container" id="productDetail">
            <p>Loading product...</p>
        </div>
    </main>

    <footer>
        <div class="container"><p>&copy; 2024 EthioShop. All rights reserved.</p></div>
    </footer>

    <script src="config.js"></script>
    <script src="assets/js/guest-auth.js"></script>
    <script src="assets/js/site-enhancements.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/product.js"></script>
</body>
</html>
