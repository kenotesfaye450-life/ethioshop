<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status - EthioShop</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .status-container { max-width: 600px; margin: 2rem auto; }
        .order-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem; margin-bottom: 1rem;
        }
        .order-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1rem;
            padding-bottom: 1rem; border-bottom: 1px solid #eee;
        }
        .status-pill {
            padding: 4px 14px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold;
        }
        .status-pending_verification { background:#fff3cd; color:#856404; }
        .status-confirmed            { background:#d4edda; color:#155724; }
        .status-rejected             { background:#f8d7da; color:#721c24; }
        .status-delivered            { background:#cce5ff; color:#004085; }
        .status-refunded             { background:#e2e3e5; color:#383d41; }
        .delivery-timeline {
            display: flex; gap: 0; margin-top: 1rem;
            border-top: 1px solid #eee; padding-top: 1rem;
        }
        .timeline-step {
            flex: 1; text-align: center; font-size: 0.75rem; color: #aaa;
        }
        .timeline-step.done { color: #27ae60; font-weight: bold; }
        .timeline-step .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #ddd; margin: 0 auto 4px;
        }
        .timeline-step.done .dot { background: #27ae60; }
        .search-box {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .search-box input {
            width: 100%; padding: 0.75rem; border: 1px solid #ddd;
            border-radius: 6px; font-size: 1rem; box-sizing: border-box;
        }
        .search-box button {
            width: 100%; margin-top: 0.75rem; padding: 0.75rem;
            background: #2c7da0; color: white; border: none;
            border-radius: 6px; font-size: 1rem; cursor: pointer;
        }
        .search-box button:hover { background: #1a5f7a; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand"><h1>EthioShop</h1></div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="cart.html" class="cart-link">Cart <span class="cart-badge">0</span></a>
                    <a href="dashboard.html">My Account</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container status-container">
            <h2 style="margin-bottom:1.5rem;">Track Your Orders</h2>

            <div class="search-box">
                <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">
                    Enter your phone number to see your orders
                </label>
                <input type="tel" id="phoneInput"
                       placeholder="+251912345678 or 0912345678"
                       pattern="(\+251|251|0)[97]\d{8}">
                <button onclick="lookupOrders()">🔍 Track Orders</button>
            </div>

            <div id="errorMsg" style="display:none; color:#c0392b; padding:0.75rem;
                 background:#fdecea; border-radius:6px; margin-bottom:1rem;"></div>

            <div id="ordersContainer"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 EthioShop. All rights reserved.</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="assets/js/cart.js"></script>
    <script>
        // Pre-fill phone from session
        const stored = sessionStorage.getItem('userPhone');
        if (stored) {
            document.getElementById('phoneInput').value = stored;
            lookupOrders();
        }

        // Allow Enter key
        document.getElementById('phoneInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') lookupOrders();
        });

        async function lookupOrders() {
            const phone = document.getElementById('phoneInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            const container = document.getElementById('ordersContainer');

            errorEl.style.display = 'none';
            container.innerHTML = '<p style="color:#999; text-align:center;">Loading...</p>';

            if (!phone) {
                errorEl.textContent = 'Please enter your phone number.';
                errorEl.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(
                    `${API_BASE_URL}/api/users/${encodeURIComponent(phone)}/orders`
                );
                const data = await res.json();

                if (!data.success) {
                    throw new Error(data.error?.message || 'User not found');
                }

                sessionStorage.setItem('userPhone', phone);
                renderOrders(data.orders);

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                container.innerHTML = '';
            }
        }

        function deliverySteps(deliveryStatus) {
            const steps = [
                { key: 'pending_assignment', label: 'Pending' },
                { key: 'assigned',           label: 'Assigned' },
                { key: 'in_transit',         label: 'In Transit' },
                { key: 'delivered',          label: 'Delivered' },
            ];
            const order_map = { pending_assignment:0, assigned:1, in_transit:2, delivered:3 };
            const current = order_map[deliveryStatus] ?? 0;

            return `<div class="delivery-timeline">` +
                steps.map((s, i) => `
                    <div class="timeline-step ${i <= current ? 'done' : ''}">
                        <div class="dot"></div>
                        ${s.label}
                    </div>
                `).join('') +
            `</div>`;
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');

            if (!orders.length) {
                container.innerHTML = `
                    <div class="order-card" style="text-align:center; color:#666;">
                        <p style="font-size:1.1rem;">No orders found.</p>
                        <a href="shop.html" class="btn btn-primary" style="margin-top:1rem;">Start Shopping</a>
                    </div>`;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <strong>Order #${order.id}</strong><br>
                            <small style="color:#888;">${new Date(order.created_at).toLocaleString()}</small>
                        </div>
                        <span class="status-pill status-${order.status}">
                            ${order.status.replace(/_/g, ' ')}
                        </span>
                    </div>
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;">
                        <div>
                            <p style="margin:0; color:#555;">Subtotal: ${order.subtotal.toFixed(2)} ETB</p>
                            ${order.credit_used > 0
                                ? `<p style="margin:0; color:#27ae60;">Credit: -${order.credit_used.toFixed(2)} ETB</p>`
                                : ''}
                            <p style="margin:0; font-weight:bold; font-size:1.1rem;">
                                Total: ${order.final_total.toFixed(2)} ETB
                            </p>
                        </div>
                        <div style="text-align:right;">
                            <a href="dashboard.html" style="color:#2c7da0; font-size:0.9rem;">
                                View details →
                            </a>
                        </div>
                    </div>
                    ${order.status === 'confirmed' ? deliverySteps(order.delivery_status) : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
